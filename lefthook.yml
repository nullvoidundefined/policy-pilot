pre-commit:
  parallel: true
  commands:
    format:
      run: pnpm format:check
    lint:
      run: pnpm lint

pre-push:
  commands:
    format:
      run: pnpm format:check
    lint:
      run: pnpm lint
    build:
      run: pnpm --filter doc-qa-rag-common build && pnpm --filter doc-qa-rag-server build && pnpm --filter doc-qa-rag-worker build
