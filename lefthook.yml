pre-commit:
  parallel: true
  commands:
    format:
      run: pnpm format:check
    lint:
      run: pnpm lint

pre-push:
  commands:
    format:
      run: pnpm format:check
    lint:
      run: pnpm lint
    build:
      run: pnpm --filter policy-pilot-common build && pnpm --filter policy-pilot-server build && pnpm --filter policy-pilot-worker build
