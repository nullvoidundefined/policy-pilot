<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <!-- Wing motif -->
  <g transform="translate(10, 20)">
    <!-- Left wing -->
    <path d="M30 20 Q0 20 2 30 Q4 40 30 38 Z" fill="#1B2A4A"/>
    <path d="M30 24 Q8 24 9 30 Q10 36 30 35 Z" fill="#D4940A"/>
    <!-- Right wing -->
    <path d="M30 20 Q60 20 58 30 Q56 40 30 38 Z" fill="#1B2A4A"/>
    <path d="M30 24 Q52 24 51 30 Q50 36 30 35 Z" fill="#D4940A"/>
    <!-- Center circle -->
    <circle cx="30" cy="29" r="8" fill="#1B2A4A"/>
    <circle cx="30" cy="29" r="5" fill="#D4940A"/>
    <circle cx="30" cy="29" r="2.5" fill="#1B2A4A"/>
    <!-- Compass needle -->
    <line x1="30" y1="22" x2="30" y2="25" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- "PolicyPilot" text in retro style -->
  <text x="80" y="52" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" letter-spacing="1" fill="#1B2A4A">
    Policy<tspan fill="#D4940A" font-style="italic">Pilot</tspan>
  </text>

  <!-- Retro underline accent -->
  <line x1="80" y1="60" x2="340" y2="60" stroke="#1B2A4A" stroke-width="2"/>
  <line x1="80" y1="64" x2="200" y2="64" stroke="#D4940A" stroke-width="1.5"/>
</svg>
